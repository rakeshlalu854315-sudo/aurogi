
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aarogya Profile</title>

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
  text-align: center;
}

.card {
  width: 90%;
  max-width: 350px;
  margin: 50px auto;
  padding: 20px;
  background: white;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}
</style>

</head>

<body>

<div class="card">

<h2>👤 Your Profile</h2>

<p><b>Name:</b> <span id="showName"></span></p>
<p><b>Occupation:</b> <span id="showOccupation"></span></p>
<p><b>Mobile:</b> <span id="showMobile"></span></p>

<a href="index.html">
  <button>⬅ Back</button>
</a>

</div>

<script>
document.getElementById("showName").innerText = localStorage.getItem("name");
document.getElementById("showOccupation").innerText = localStorage.getItem("occupation");
document.getElementById("showMobile").innerText = localStorage.getItem("mobile");
</script>

</body>
</html>
